<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu | Verdexa AI</title>

    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon/favicon-16x16.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='favicon/site.webmanifest') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="page-transition-overlay" id="pageTransitionOverlay">
    <div class="pt-brand">
        <i class="fa-solid fa-seedling"></i>
        <span>Verdexa AI</span>
    </div>
</div>
<script src="{{ url_for('static', filename='js/page-transition.js') }}"></script>

<div class="background-blur blur1"></div>
<div class="background-blur blur2"></div>

<a href="/" class="back-home">
    <i class="fa-solid fa-arrow-left"></i>
    Về trang chủ
</a>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fa-solid fa-seedling"></i>
            <span>Verdexa AI</span>
        </div>

        <h1>Quên mật khẩu</h1>
        <p class="auth-subtitle">Nhập email đã đăng ký, chúng tôi sẽ gửi liên kết đặt lại mật khẩu cho bạn</p>

        <div class="auth-error" id="forgotError"></div>
        <div class="auth-success" id="forgotSuccess"></div>

        <form class="auth-form" id="forgotForm">
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="ban@email.com" required>
                </div>
            </div>

            <button type="submit" class="auth-submit" id="forgotSubmit">
                <i class="fa-solid fa-paper-plane"></i>
                Gửi liên kết đặt lại mật khẩu
            </button>
        </form>

        <div class="auth-divider">hoặc</div>

        <p class="auth-switch">
            Đã nhớ mật khẩu? <a href="/login">Đăng nhập</a>
        </p>
    </div>
</div>

<script>
    const forgotForm = document.getElementById('forgotForm');
    const forgotError = document.getElementById('forgotError');
    const forgotSuccess = document.getElementById('forgotSuccess');
    const forgotSubmit = document.getElementById('forgotSubmit');

    forgotForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        forgotError.classList.remove('show');
        forgotError.textContent = '';
        forgotSuccess.classList.remove('show');
        forgotSuccess.textContent = '';

        const email = document.getElementById('email').value.trim();

        if (!email) {
            forgotError.textContent = 'Vui lòng nhập email.';
            forgotError.classList.add('show');
            return;
        }

        const originalHtml = forgotSubmit.innerHTML;
        forgotSubmit.disabled = true;
        forgotSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang gửi...';

        try {
            const res = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            let data = {};
            try { data = await res.json(); } catch (_) {}

            if (res.ok) {
                forgotSuccess.textContent = data.message || 'Nếu email này đã đăng ký, một liên kết đặt lại mật khẩu đã được gửi tới hộp thư của bạn.';
                forgotSuccess.classList.add('show');
                forgotForm.reset();
            } else {
                forgotError.textContent = data.error || 'Có lỗi xảy ra. Vui lòng thử lại.';
                forgotError.classList.add('show');
            }
        } catch (err) {
            forgotError.textContent = 'Không thể kết nối tới máy chủ. Vui lòng thử lại sau.';
            forgotError.classList.add('show');
        } finally {
            forgotSubmit.disabled = false;
            forgotSubmit.innerHTML = originalHtml;
        }
    });
</script>

</body>
</html>
