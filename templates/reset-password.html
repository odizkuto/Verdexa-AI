<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu | Verdexa AI</title>

    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon/favicon-16x16.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='favicon/site.webmanifest') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

{% include "_page_transition.html" %}

<div class="background-blur blur1"></div>
<div class="background-blur blur2"></div>

<a href="/" class="back-home">
    <i class="fa-solid fa-arrow-left"></i>
    Về trang chủ
</a>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fa-solid fa-seedling"></i>
            <span>Verdexa AI</span>
        </div>

        <h1>Đặt lại mật khẩu</h1>
        <p class="auth-subtitle">Nhập mật khẩu mới cho tài khoản của bạn</p>

        <div class="auth-error" id="resetError"></div>
        <div class="auth-success" id="resetSuccess"></div>

        {% if token %}
        <form class="auth-form" id="resetForm">
            <input type="hidden" id="token" value="{{ token }}">

            <div class="form-group">
                <label for="password">Mật khẩu mới</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Ít nhất 6 ký tự" required minlength="6">
                    <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Nhập lại mật khẩu mới</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required minlength="6">
                </div>
            </div>

            <button type="submit" class="auth-submit" id="resetSubmit">
                <i class="fa-solid fa-check"></i>
                Đặt lại mật khẩu
            </button>
        </form>
        {% else %}
        <p class="auth-switch">Liên kết không hợp lệ. Vui lòng yêu cầu <a href="/forgot-password">liên kết mới</a>.</p>
        {% endif %}

        <div class="auth-divider">hoặc</div>

        <p class="auth-switch">
            Đã nhớ mật khẩu? <a href="/login">Đăng nhập</a>
        </p>
    </div>
</div>

{% if token %}
<script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', () => {
        const isHidden = passwordInput.type === 'password';
        passwordInput.type = isHidden ? 'text' : 'password';
        togglePassword.classList.toggle('fa-eye');
        togglePassword.classList.toggle('fa-eye-slash');
    });

    const resetForm = document.getElementById('resetForm');
    const resetError = document.getElementById('resetError');
    const resetSuccess = document.getElementById('resetSuccess');
    const resetSubmit = document.getElementById('resetSubmit');
    const token = document.getElementById('token').value;

    resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        resetError.classList.remove('show');
        resetError.textContent = '';
        resetSuccess.classList.remove('show');
        resetSuccess.textContent = '';

        const password = passwordInput.value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password.length < 6) {
            resetError.textContent = 'Mật khẩu phải có ít nhất 6 ký tự.';
            resetError.classList.add('show');
            return;
        }

        if (password !== confirmPassword) {
            resetError.textContent = 'Mật khẩu nhập lại không khớp.';
            resetError.classList.add('show');
            return;
        }

        const originalHtml = resetSubmit.innerHTML;
        resetSubmit.disabled = true;
        resetSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...';

        try {
            const res = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password })
            });

            let data = {};
            try { data = await res.json(); } catch (_) {}

            if (res.ok) {
                resetSuccess.textContent = data.message || 'Đặt lại mật khẩu thành công. Bạn có thể đăng nhập ngay bây giờ.';
                resetSuccess.classList.add('show');
                resetForm.reset();
                resetForm.style.display = 'none';
                setTimeout(() => { window.location.href = '/login'; }, 2000);
            } else {
                resetError.textContent = data.error || 'Có lỗi xảy ra. Vui lòng thử lại.';
                resetError.classList.add('show');
            }
        } catch (err) {
            resetError.textContent = 'Không thể kết nối tới máy chủ. Vui lòng thử lại sau.';
            resetError.classList.add('show');
        } finally {
            resetSubmit.disabled = false;
            resetSubmit.innerHTML = originalHtml;
        }
    });
</script>
{% endif %}

</body>
</html>
